# confluence_bot configuration
# API keys must NEVER be placed here — use .env / environment variables

# ── Symbols & timeframes ────────────────────────────────────────────────────
symbols:
  - BTCUSDT    # tier1 — anchor, all strategies confirmed
  - ETHUSDT    # tier2 — ema_pullback, leadlag, sweep pending backtest
  - SOLUSDT    # tier2 — sweep confirmed +11.5%, ema_pullback pending engine fix
  - BNBUSDT    # tier2 — ema_pullback pending engine fix, leadlag alt target
  - XRPUSDT    # tier2 NEW — top 3 market cap, ETF narrative, clean trends
  - LINKUSDT   # tier2 NEW — institutional demand, strong trend following
  - DOGEUSDT   # tier3 — leadlag alt target only, all direct strategies excluded
  - SUIUSDT    # tier3 — leadlag alt target only, pending backtest
  # Removed: ADAUSDT — no confirmed strategy, volume declined
  # Removed: DOTUSDT — lost ecosystem relevance in 2026
  # Removed: AVAXUSDT — superseded by SOL, no confirmed strategy

timeframes:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h

# How often (seconds) the main evaluation loop runs
loop_interval_seconds: 60

# ── Regime detection ─────────────────────────────────────────────────────────
regime:
  # ── RegimeDetector (class-based, hysteresis) ─────────────────────────────
  adx_range_threshold: 20         # all 3 recent ADX readings < this → enter RANGE
  adx_trend_threshold: 25         # ≥2 of last 3 ADX readings > this → exit RANGE (symmetric hysteresis)
  regime_min_dwell_bars: 12       # minimum calls before regime change allowed (~4H bars worth of stability)
  range_size_max_pct: 0.12        # max (high-low)/mid over 20×4H bars to confirm RANGE
  crash_weekly_drop: -0.12        # 7-day close change < this (−12 %) → crash candidate
  pump_weekly_gain:   0.12        # 7-day close change > this (+12 %) → pump candidate
  ema_crash_period: 50            # EMA period for crash baseline (also used for pump)
  trend_tf: "4h"                  # timeframe used for ADX
  breakout_window_bars: 6         # bars after range exit during which breakout can fire
  breakout_margin_pct: 0.010      # price must be 1.0% beyond range boundary to confirm

  # ── Legacy fields (kept for backward compat) ────────────────────────────
  crash_drawdown_pct: 15.0
  crash_window_candles: 24
  trend_adx_threshold: 25.0
  range_atr_ratio_max: 0.02
  min_range_candles: 20

# ── Score thresholds ─────────────────────────────────────────────────────────
thresholds:
  trend_long_fire: 0.65
  trend_short_fire: 0.75          # re-enabled: requires cvd_bearish + oi_flush + 1 more signal
  range_long_fire: 0.60
  range_short_fire: 1.10          # disabled: 25% WR in backtest (consistent money-loser)
  crash_short_fire: 0.75          # higher bar for crash shorts
  pump_long_fire: 0.65            # htf+ob or htf+oi = 0.70 → fires; htf alone = 0.40 → blocked
  breakout_long_fire: 0.60
  breakout_short_fire: 0.75       # raised: breakout short had 0% WR in backtest

# ── Signal weights (trend LONG) ──────────────────────────────────────────────
# Backtest validation: htf_structure = +45% edge, vpvr_support = -22% edge
# oi_funding fired only 2x in backtest (almost never True)
# options_flow/options_skew/call_skew_roc: Deribit only covers BTC+ETH — zero for alt coins
# time_distribution: confirmed -33% edge in backtest — fully disabled
# rsi_divergence: bullish div on 1H — price lower low, RSI higher low (seller exhaustion)
# ema_pullback: 20 EMA > 50 EMA on 1H + price pulled back to 20 EMA (optimal entry timing)
weights:
  trend_long:
    cvd_bullish:    0.20          # reduced slightly to make room for new signals
    liq_sweep:      0.10          # reduced: synthetic clusters less reliable
    htf_structure:  0.25          # reduced: shares dominance with new signals
    vpvr_support:   0.15          # POC reclaim (cross from below + vol confirm)
                                  # was 0.00 due to wrong backtest logic — restored
    oi_funding:     0.05          # reduced: fired only 2x in backtest
    order_block:    0.05          # keep: confluence entry point
    whale_flow:     0.10          # keep: works all symbols
    rsi_divergence:    0.15        # bullish divergence — price lower low + RSI higher low on 1H
    rsi_div_mtf:       0.20        # MTF divergence — 1H + 4H both confirming, higher confidence
    ema_pullback:      0.10        # 20/50 EMA pullback entry — best trend timing signal
    ls_crowded_short:  0.10        # Coinglass L/S ratio < 0.6 → crowd overly short → contrarian bullish
    funding_ramp_bull:    0.10      # Coinglass extreme negative funding → short squeeze fuel
    funding_extreme_long: 0.10     # extreme negative funding → crowd max short → contrarian LONG
    fvg_bullish:       0.10        # NEW: Fair Value Gap retest — unfilled 1H imbalance zone
    bb_squeeze_bull:   0.05        # NEW: Bollinger squeeze release upside — volatility expansion

  range_long:
    absorption:      0.20         # primary range long signal, works all symbols
    wyckoff_spring:  0.20         # ideal range entry, works all symbols
    rsi_oversold:    0.15         # RSI(14)<35 turning up near range_low
    perp_basis:      0.10         # absorbed freed weight, works all symbols
    anchored_vwap:   0.15         # strong live signal
    vwap_oversold:   0.15         # NEW: price below VWAP-2σ — statistically oversold
    fvg_bullish:     0.05         # NEW: Fair Value Gap retest — unfilled 1H imbalance

  range_short:
    ask_absorption: 0.25          # primary signal
    upthrust:       0.25          # needs both ask_absorption + upthrust ideally
    perp_basis:     0.10          # absorbed freed weight
    options_skew:   0.00          # DISABLED: Deribit BTC/ETH only — dead weight for 7/9 symbols
    anchored_vwap:  0.20          # strong live signal, works all symbols
    time_distribution: 0.00       # DISABLED: confirmed -33% edge in backtest
    vwap_overbought: 0.15         # NEW: price above VWAP+2σ — statistically overbought
    fvg_bearish:     0.05         # NEW: Fair Value Gap retest — unfilled bearish 1H imbalance

  bear:
    cvd_bearish:     0.35         # dominant bear predictor
    oi_flush:        0.30         # strong confirmation signal
    funding_extreme: 0.15         # useful contrarian signal
    whale_inflow:    0.10         # supplementary
    rsi_divergence:  0.10         # NEW: bearish divergence — price higher high + RSI lower high on 1H
    ls_crowded_long: 0.10         # NEW: Coinglass L/S ratio > 1.8 → crowd overly long → contrarian bearish
    funding_ramp:    0.10         # NEW: Coinglass extreme positive funding → longs overheating

  crash:
    dead_cat:       0.30
    liq_grab_short: 0.30
    cvd_bearish:    0.20          # raised slightly
    oi_flush:       0.15
    whale_inflow:   0.05          # reduced

  pump:
    htf_structure: 0.40           # reduced: no longer sole gatekeeper (min_ok requires confluence)
    oi_funding:    0.30           # raised: OI confirms new money entering the pump
    order_block:   0.30           # raised: entry timing confirmation — avoids local high entries

  breakout_long:
    htf_structure: 0.45           # dominant signal
    oi_funding:    0.15           # rarely fires
    absorption:    0.20           # keep
    bb_squeeze_bull: 0.20         # NEW: squeeze release = precise breakout timing

  breakout_short:
    oi_flush:       0.70          # primary: OI flush confirms capitulation
    ask_absorption: 0.30          # secondary: absorption at resistance confirms supply

# ── Risk management ──────────────────────────────────────────────────────────
risk:
  max_risk_usdt: 5                # max $5 loss per trade (5% of $100 margin)
  max_position_size_usdt: 300    # $300 notional = $100 margin at 3x leverage
  max_open_positions: 5          # 5 × $100 margin = $500 total (10% of balance)
  max_same_direction_positions: 2  # max 2 longs OR 2 shorts at once — correlation cap
  rr_ratio: 2.5                   # TP = entry ± stop_dist × 2.5
  leverage: 3
  margin_type: ISOLATED
  # ── Circuit breaker ───────────────────────────────────────────────────────
  max_daily_loss_pct: 3.0         # halt if daily loss > 3% of balance (~$144)
  max_daily_loss_usdt: 150        # or > $150 in one day (30 losing trades × $5)
  max_consecutive_losses: 6       # halt after 6 consecutive losses
  post_trade_cooldown_mins: 30    # 30 min cooldown per symbol after any close
  # ── Extreme volatility gate ──────────────────────────────────────────────
  # Halts all new entries when 4H ATR spikes 3× above median (flash crash events).
  # Catches: COVID March 2020, LUNA May 2022, FTX November 2022.
  atr_spike_gate_enabled: true
  atr_spike_gate_mult: 3.0    # block when current ATR > 3× 20-bar average
  # ── Dynamic slippage model ──────────────────────────────────────────────
  # Slippage scales with ATR ratio so position size shrinks automatically
  # when market conditions are noisy. Set slippage_atr_scale: false to use
  # the regime base only (disables the ATR multiplier).
  slippage_atr_scale: true
  slippage_by_regime:
    TREND:    0.0002   # 0.02% baseline
    RANGE:    0.0002   # same — tight markets
    CRASH:    0.0010   # 0.10% — cascade conditions
    PUMP:     0.0008   # 0.08% — thin ask side
    BREAKOUT: 0.0005   # 0.05% — momentum entries
  extreme_vol_gate:
    enabled: true
    lookback_bars: 50       # bars to compute median ATR
    spike_multiplier: 3.0   # current TR > 3× median = extreme event
    timeframe: "4h"         # check on 4H bars

# ── Hard filters ─────────────────────────────────────────────────────────────
filters:
  min_24h_volume_usdt: 50000000   # ignore illiquid markets
  max_spread_pct: 0.05            # max bid/ask spread as % of price
  news_blackout_minutes: 15       # no entries within N min of major news

# ── CVD settings ─────────────────────────────────────────────────────────────
cvd:
  slope_window: 20                # candles to compute slope over
  divergence_window: 50
  min_delta_ratio: 0.3            # delta / avg_volume threshold

# ── Funding rate ─────────────────────────────────────────────────────────────
funding:
  extreme_positive: 0.001         # 0.1% per 8h (bearish contrarian)
  extreme_negative: -0.001        # -0.1% (crash panic)
  neutral_band: 0.0003            # ±0.03% = neutral for range

# ── Funding contrarian ───────────────────────────────────────────────────────
funding_contrarian:
  enabled: true
  extreme_positive_pct: 0.0012   # 0.12%/8H threshold for SHORT
  extreme_negative_pct: -0.0012  # -0.12%/8H threshold for LONG
  sl_pct: 0.008                  # 0.8% SL
  tp_pct: 0.016                  # 1.6% TP (2:1 RR)
  cooldown_hours: 8              # one signal per 8H per symbol
  max_positions: 2
  check_interval_secs: 300       # check every 5 min (funding updates every 8H)

# ── VPVR ─────────────────────────────────────────────────────────────────────
vpvr:
  lookback_candles: 200
  hvn_tolerance_pct: 0.5          # price within 0.5% of HVN to trigger

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  db_path: "confluence_bot.db"
  metrics_host: "0.0.0.0"
  metrics_port: 8001

# ── Lead-Lag strategy ────────────────────────────────────────────────────────
# Fires alt entries when BTC breaks its rolling 1h VWAP with a volume spike.
# Alts lag BTC by 5-15 min — we capture that catch-up move.
leadlag:
  enabled: true  # validated: profitable in backtest
  vwap_window_bars: 12          # 12 × 5m bars = 1h rolling VWAP anchor
  min_vwap_break_pct: 0.006     # BTC close must be ≥0.6% beyond VWAP  [tuned: was 0.003]
  vol_spike_mult: 2.0           # current 5m vol / 20-bar avg must exceed this [tuned: was 1.5]
  max_alt_premove_pct: 0.003    # alt already moved >0.3%? skip it (it priced in)
  cooldown_mins: 30             # min gap between two trades on the same symbol
  max_alts_per_signal: 6        # max simultaneous alt entries per BTC breakout (raised: more alts per signal)
  check_interval_secs: 30       # how often the leadlag loop checks BTC
  stop_pct: 0.0020              # SL = 0.20% from entry
  tp_pct:   0.0100              # TP = 1.00% from entry (5 RR)  [tuned: was 0.005]
  max_hold_bars: 6              # max 6 × 5m bars = 30 min hold
  require_trend_aligned: true   # only LONG above BTC 1h EMA20, SHORT below [tuned: new]
  exclude_symbols:              # never enter these as alts
    - BTCUSDT

# ── Session open trap ────────────────────────────────────────────────────────
# Fade the first 15-min fake move at Asia / London / NY opens.
session_trap:
  enabled: false
  sessions: [1, 8, 13]
  min_move_pct: 0.006        # 0.6% minimum fake move (tightened from 0.3%)
  strong_move_pct: 0.009     # 0.9% = strong tier (tightened from 0.6%)
  max_range_pct: 0.007       # reject sessions wider than 0.7% (tightened from 1.5%)
  sl_buffer_pct: 0.002
  rr_ratio: 1.5
  max_hold_bars: 12
  cooldown_mins: 60
  max_entries_per_session: 3
  fire_threshold: 0.75       # 3 of 4 (tightened from 0.50)

# ── 15m EMA Pullback strategy ────────────────────────────────────────────────
# Trend-continuation entries at 15m EMA21 pullback, filtered by 4H direction.
# Fires 2-5x per symbol per day in trending conditions.
ema_pullback:
  enabled: true
  check_interval_secs: 30
  max_positions: 3
  cooldown_mins: 45             # 45 min cooldown — one pullback per 45m per symbol
  fire_threshold: 0.75
  pullback_touch_pct: 0.002     # price must be within 0.2% of EMA21 (tightened from 0.4%)
  min_bounce_body_pct: 0.002    # close must be ≥ 0.2% above EMA21 (not just any close)
  min_ema_dist_pct: 0.002       # separate key for scorer _MIN_EMA_DIST (fixes duplicate key bug)
  rr_ratio: 1.5                 # revert BTC back to 1.5
  mc_vol_ratio_max: 0.0          # disabled — not yet backtest-validated
  sl_atr_mult:                  # ATR multiplier per tier — replaces fixed EMA-distance SL
    tier1: 1.5                  # BTC: cleanest trend, tightest ok
    tier2: 2.0                  # XRP, LINK, ETH, SOL: moderate noise
    tier3: 2.5                  # SUI, DOGE: high volatility floor
    base:  2.0
  min_sl_pct: 0.003             # absolute floor — SL never < 0.3% regardless of ATR
  vol_quiet_mult: 0.8           # tightened from 1.2 — only enter on very quiet pullbacks
  adx_short_min: 30             # minimum 4H ADX for SHORT entries (weak bears are choppy)
  adx_long_min: 22              # minimum 4H ADX for LONG entries (bull markets more forgiving)
  max_hold_bars: 4              # 4 × 15m = 1h max hold (was 8 — failed setups dragged to 2h)
  rsi_long_min: 30              # lower bound for LONG RSI (non-overlapping: 30–50)
  rsi_long_max: 50              # upper bound for LONG RSI
  rsi_short_min: 50             # lower bound for SHORT RSI (non-overlapping: 50–70)
  rsi_short_max: 70             # upper bound for SHORT RSI
  exclude_symbols:
    - BTCUSDT    # regime gating broke it — needs separate investigation
    - BNBUSDT    # BAD: TREND PF0.69 WR19% -$55
    - DOGEUSDT   # BAD: TREND PF0.80 WR28% -$45
# ── HTF Demand / Supply Zone strategy ───────────────────────────────────────
# 4H origin-of-move zone retests with 1H bullish/bearish confirmation.
# Highest quality, lowest frequency: 1-3x per symbol per day.
zone:
  enabled: true
  check_interval_secs: 60       # check every 60s (aligned with 1H bar closes)
  max_positions: 2              # conservative — these are higher-size entries
  cooldown_mins: 120            # 2h cooldown — zone retests are rare
  fire_threshold: 0.75
  min_impulse_pct: 0.030        # impulse after base must be ≥ 3% (raised from 2%)
  zone_width_max_pct: 0.015     # zone (high-low)/mid must be ≤ 1.5% (tight zones only)
  rr_ratio: 1.5                 # TP = risk × 1.5 (lowered from 2.5× — zones timeout too often)
  max_zone_retests: 1           # only fire on first touch — prior wick into zone invalidates it

# ── OI Spike Fade strategy ───────────────────────────────────────────────────
# Fades liquidation cascades triggered by sudden OI surges ≥ spike_pct in 2h.
# Confirmed by wick rejection on the 15m bar + volume spike (liquidation cascade).
# Skips when OI data unavailable (Binance + Bybit both missing).
oi_spike:
  enabled: false
  spike_pct: 0.15             # OI must increase ≥ 15% within lookback_hours
  lookback_hours: 2.0         # compare current OI vs 2h ago
  wick_pct: 0.005             # lower/upper wick must be ≥ 0.5% of price
  sl_buffer: 0.002            # SL 0.2% beyond the wick tip
  atr_mult: 2.0               # TP = entry ± ATR(14, 15m) × atr_mult
  atr_window: 14
  ema_period: 21              # 15m EMA21 alignment gate
  rsi_window: 14
  vol_mult: 1.5               # volume must be ≥ 1.5× 20-bar average
  threshold: 0.75             # minimum score to fire (oi_spike 0.40 + rejection 0.35)
  check_interval_secs: 60
  cooldown_mins: 60           # 1h per-symbol cooldown after entry
  max_positions: 2            # concentrated-risk strategy
  rr_ratio: 2.0

# ── VWAP Band Reversion strategy ─────────────────────────────────────────────
# Mean-reversion entries when price touches the ±2σ rolling VWAP band on 15m
# and closes back inside.  Blocked in strong trends (ADX > 30) where bands
# expand continuously and reversion fails.  Target = VWAP midline (TP dynamic).
vwap_band:
  enabled: true   # confirmed: XRP RANGE PF1.24 WR34%, LINK RANGE PF1.38 WR29%
  window_bars: 20             # 20 × 15m = 5h rolling VWAP window
  band_mult: 2.0              # ±2σ standard deviation bands
  rsi_long_max: 35            # RSI must be ≤ this for LONG entry (oversold)
  rsi_short_min: 65           # RSI must be ≥ this for SHORT entry (overbought)
  adx_max: 30                 # block if 4H ADX > 30 (too trendy for mean reversion)
  vol_max_mult: 1.5           # volume must be ≤ this × 20-bar avg (not a dump)
  check_interval_secs: 30     # 15m bars — poll every 30s to catch rejections early
  cooldown_mins: 30           # per-symbol cooldown after entry
  max_positions: 3
  sl_buffer_pct: 0.002        # legacy — kept for fallback; ATR SL now takes precedence
  sl_atr_mult:                # ATR multiplier per tier — replaces fixed band-distance SL
    tier1: 1.2                # BTC: tightest (was 0.32% fixed — now ATR × 1.2)
    tier2: 1.5                # XRP, LINK: proven too tight at 0.32% vs 0.57% ATR
    tier3: 2.0                # SUI, DOGE: high volatility floor
    base:  1.5
  min_sl_pct: 0.003           # absolute floor — SL never < 0.3% regardless of ATR
  max_hold_bars: 4              # 4 × 15m = 1h max hold (was 8 — VWAP reversion should happen within 1h)
  mc_vol_ratio_max: 0.0          # disabled — not yet backtest-validated
  long_only: true    # backtest confirmed SHORT direction: WR 0.5%, PF 0.01, 196 SL/197 trades
  exclude_symbols:
    - BTCUSDT    # TREND PF1.07 weak, not worth enabling
    - ETHUSDT    # TREND PF0.67 BAD
    - SOLUSDT    # TREND PF0.60 BAD
    - BNBUSDT    # TREND PF1.00 BAD
    - DOGEUSDT   # TREND PF0.68 BAD — volume filter made worse
    # XRPUSDT removed — TREND PF1.40 WR31%, RANGE PF1.48 WR30% ✅
    # LINKUSDT removed — TREND PF1.50 WR40%, RANGE PF2.25 WR36% ✅
    # SUIUSDT removed — TREND PF1.52 WR27% ✅

# ── Wyckoff spring strategy ───────────────────────────────────────────────────
wyckoff_spring:
  enabled: true
  cooldown_mins: 60
  rr_ratio: 2.5
  sl_buffer_pct: 0.001
  fire_threshold: 0.67
  check_interval_secs: 60
  max_positions: 2
  mc_vol_ratio_max: 2.0    # block when recent 6H vol > 2.0× baseline (backtest: PF 3.99)

# ── Liquidity sweep strategy ─────────────────────────────────────────────────
liq_sweep:
  enabled: true
  cooldown_mins: 60
  rr_ratio: 2.5
  sl_buffer_pct: 0.001
  lookback_bars: 30
  eq_level_tol: 0.002
  min_separation_bars: 10
  vol_spike_mult: 1.5
  fire_threshold: 0.75
  check_interval_secs: 60
  max_positions: 2
  mc_vol_ratio_max: 2.5    # block when recent 6H vol > 2.5× baseline (backtest: PF 2.62)

# ── Session filter ────────────────────────────────────────────────────────────
session_filter:
  enabled: true
  block_saturday: true
  dead_zone_start_utc: 22    # was 21 — narrowed by 1 hour
  dead_zone_end_utc: 24      # was 01 — narrowed from 4h block to 2h block
  # Previously blocked 21:00–01:00 (4h). Now only 22:00–00:00 (2h) + Saturday

# ── BTC direction gate ────────────────────────────────────────────────────────
btc_direction_gate:
  enabled: true
  mode: veto          # was: confirm (required BTC same direction — too strict)
  fall_threshold: -0.0003   # block alt LONG if BTC falling faster than this per hour
  rise_threshold: +0.0003   # block alt SHORT if BTC rising faster than this per hour
  # flat BTC = allowed (altcoin season conditions)
  apply_to: [ema_pullback, vwap_band]
  skip_for: [BTCUSDT]

# ── Fair Value Gap Fill strategy ─────────────────────────────────────────────
# Entry into unfilled 1H price imbalance zones (FVGs).
# Fires when price returns to a virgin gap with HTF alignment + RSI confirmation.
fvg:
  enabled: true   # confirmed: BTC PF1.65 WR39%, SOL PF1.64 WR43%, BNB PF2.11 WR44%
  min_gap_pct: 0.003          # FVG must be ≥ 0.3% wide (filters micro-noise)
  check_interval_secs: 60     # align with 1H bar close
  cooldown_mins: 45           # per-symbol cooldown after entry
  max_positions: 3            # max simultaneous FVG trades
  rr_ratio: 2.0               # TP = entry ± dist × 2.0
  sl_buffer_pct: 0.002        # SL 0.2% beyond gap edge
  lookback_bars: 50           # scan last 50 1H candles for FVGs
  mc_vol_ratio_max: 2.0    # block when recent 6H vol > 2.0× baseline (backtest: PF 2.80)
  macro_filter_enabled: true  # 1D EMA200 gate — LONG only above, SHORT only below
  macro_ema_period: 200       # EMA period for macro direction gate
  exclude_symbols:
    - XRPUSDT    # TR:PF0.17 WR7% -$199 — worst result in entire scan
    - LINKUSDT   # TR:PF0.68 WR24% -$58

# ── Micro Range Flip strategy ────────────────────────────────────────────────
microrange:
  enabled: true
  mc_vol_ratio_max: 0.0          # disabled — not yet backtest-validated
  exclude_symbols:
    - ETHUSDT    # TREND PF0.89 BAD, RANGE PF0.80 BAD
    - SOLUSDT    # TREND PF1.01 marginal, RANGE PF0.94 BAD
    - BNBUSDT    # TREND PF0.93 BAD, RANGE PF1.14 borderline
    # XRPUSDT removed — RANGE PF1.32 WR28% confirmed ✅
    # LINKUSDT removed — RANGE PF1.26 WR33% confirmed ✅
    # DOGEUSDT confirmed CRASH PF1.97 WR38% — removed from exclude
    # SUIUSDT confirmed CRASH PF1.91 WR41% — removed from exclude
  window_bars: 12             # was 10 — longer window = rarer but higher quality boxes
  range_max_pct: 0.005      # 0.5% max box width (tightened from 1.0%)
  entry_zone_pct: 0.001     # within 0.1% of boundary (tightened from 0.2%)
  stop_pct: 0.002           # 0.2% SL — MUST satisfy: stop_pct × 2 ≤ range_max_pct
                            # invariant check: 0.004 ≤ 0.005 ✓
  tp_ratio: 0.55
  max_hold_bars: 3
  cooldown_mins: 60             # was 20 — tripled to cut trades by ~3×
  min_box_touches: 2            # NEW: both boundaries must be tested ≥2× (no one-time spikes)
  max_positions: 3
  max_vol_ratio: 1.3
  rsi_long_max: 35          # tightened from 40
  rsi_short_min: 65         # tightened from 60
  use_rsi_filter: true
  fire_threshold: 1.0       # ALL 4 required (tightened from 0.75)
  check_interval_secs: 30
  risk_pct: 0.01
  drawdown_reduce_threshold: 0.15   # halve risk above 15% DD
  max_drawdown_pause: 0.20          # pause entries above 20% DD

# ── Long/Short ratio thresholds (Coinglass) ──────────────────────────────────
long_short_ratio:
  crowded_long_threshold:  1.8   # ratio > this → everyone long → contrarian bearish
  crowded_short_threshold: 0.6   # ratio < this → everyone short → contrarian bullish

# ── Telegram alerts ───────────────────────────────────────────────────────────
# Set TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID in environment (.env / shell).
# The bot silently no-ops when either variable is missing.
telegram:
  # alert_on_signal: true    — alert every time a trade fires (default: always on)
  # alert_on_regime_change: true — alert when regime switches
  alert_on_signal: true
  alert_on_regime_change: true

# ── Symbol tiers — per-volatility strategy parameter overrides ────────────────
# Priority: tier config > base strategy config > hardcoded defaults
# Used by core/symbol_config.py  get_symbol_config(symbol, strategy)
symbol_tiers:
  tier1:
    symbols: [BTCUSDT]
    label: "tight — low volatility, highest liquidity"
    microrange:
      range_max_pct: 0.005
      entry_zone_pct: 0.001
      stop_pct: 0.002
      tp_ratio: 0.70
      max_hold_bars: 3
      rsi_long_max: 35
      rsi_short_min: 65
      fire_threshold: 1.0
      max_vol_ratio: 1.3
    ema_pullback:
      pullback_touch_pct: 0.002
      min_bounce_body_pct: 0.002
      vol_quiet_mult: 0.8
      rr_ratio: 1.5
      max_hold_bars: 8

  tier2:
    symbols: [ETHUSDT, BNBUSDT, SOLUSDT, XRPUSDT, LINKUSDT]
    label: "medium volatility — trend following coins"
    microrange:
      range_max_pct: 0.008
      entry_zone_pct: 0.002
      stop_pct: 0.003
      tp_ratio: 0.75
      max_hold_bars: 4
      rsi_long_max: 40
      rsi_short_min: 60
      fire_threshold: 1.0
      max_vol_ratio: 1.3
    ema_pullback:
      pullback_touch_pct: 0.003
      min_bounce_body_pct: 0.002
      vol_quiet_mult: 1.0
      rr_ratio: 2.0
      max_hold_bars: 8

  tier3:
    symbols: [DOGEUSDT, SUIUSDT]
    label: "high volatility — leadlag targets only"
    microrange:
      range_max_pct: 0.012
      entry_zone_pct: 0.003
      stop_pct: 0.004
      tp_ratio: 0.85
      max_hold_bars: 4
      rsi_long_max: 45
      rsi_short_min: 55
      fire_threshold: 0.75
      max_vol_ratio: 1.5
    ema_pullback:
      pullback_touch_pct: 0.004
      min_bounce_body_pct: 0.003
      vol_quiet_mult: 1.2
      rr_ratio: 2.0
      max_hold_bars: 10

# ── Dynamic volume momentum thresholds ───────────────────────────────────────
# All values are base multipliers before tier/TF adjustments are applied.
# signals/volume_momentum.py reads these at runtime; hardcoded fallbacks exist
# for every key so removing a key here is safe.
volume_momentum:
  # Regime-based spike multipliers (base values before tier/TF adjustment)
  spike_mult:
    TREND:    1.5
    RANGE:    1.3
    CRASH:    2.5
    PUMP:     2.5
    BREAKOUT: 2.0
  # Tier adjustments (added to regime base spike)
  tier_spike_adj:
    tier1: -0.2    # BTC — tightest, cleanest volume
    tier2:  0.0    # no change
    tier3:  0.4    # high volatility alts — raise noise floor
  # Timeframe adjustments (added to spike before tier adj)
  tf_spike_adj:
    5m:   0.3
    15m:  0.1
    1h:   0.0
    4h:  -0.2
  # Liquidation thresholds (5-min window)
  liq_adjust:
    small_usd:  100000   # $100k liquidated → multiply spike_mult by 1.2
    large_usd:  500000   # $500k liquidated → multiply spike_mult by 1.5
  # Minimum relative volume (RVOL) to allow entry
  rvol_min:
    TREND:    0.7
    RANGE:    0.6
    CRASH:    0.9
    PUMP:     0.9
    BREAKOUT: 0.8

