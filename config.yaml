# ── ATR spike gate ───────────────────────────────────────────────────────────
# Blocks all scorer entries when current 1H bar ATR is > multiplier × 20-bar avg.
# Flash crash / news spike bars have terrible fill prices and near-instant stop-outs.
atr_spike_gate:
  enabled: true
  multiplier: 3.0    # block when current ATR > 3× 20-bar average
  tf: "1h"           # timeframe to measure ATR on

# ── Trailing stop (PUMP and BREAKOUT regimes only) ───────────────────────────
# Replaces fixed TAKE_PROFIT_MARKET with Binance TRAILING_STOP_MARKET so
# profitable PUMP/BREAKOUT trades trail automatically.
# callback_pct = ATR% × atr_multiplier, clamped to [min_callback_pct, max_callback_pct].
trailing_stop:
  enabled:          true
  min_callback_pct: 0.5    # minimum trail distance (Binance floor is 0.1%)
  max_callback_pct: 3.0    # maximum trail distance
  atr_multiplier:   1.5    # callback = ATR% × this
  activate_after_pct: 0.5  # activationPrice offset from entry (ignored — Binance activates immediately)
  apply_to: [PUMP, BREAKOUT]

# ── BTC dominance macro filter ───────────────────────────────────────────────
# BTC dominance rising = money rotating into BTC out of alts → block alt longs.
# BTC dominance falling = alt season → alt longs are allowed (and noted in logs).
btc_dominance:
  rising_threshold:   0.003    # +0.3% dominance change (avg of last 3 vs prior 3) = rising
  falling_threshold: -0.003    # -0.3% change = falling
  high_dominance_pct: 55.0     # above this % + rising → block alt longs
  low_dominance_pct:  48.0     # below this % → alt season confirmed
  fetch_interval_mins: 30      # how often to refresh from CoinGecko

# ── Weekly trend gate ────────────────────────────────────────────────────────
# Blocks LONG entries when BTC weekly close is below 10W EMA (macro bear).
# Blocks SHORT entries when BTC weekly close is above 10W EMA (macro bull).
# Catches regime transitions 2-3 weeks before 4H ADX responds.
weekly_trend_gate:
  enabled: true
  ema_period: 10      # 10-week EMA (~50-day)
  apply_to: [ema_pullback, fvg, vwap_band, liq_sweep]

# ── Backtest cost simulation ──────────────────────────────────────────────────
# Applied to every round-trip trade: fees (entry + exit), slippage (entry + exit),
# and accrued funding based on hold duration.
backtest:
  taker_fee_pct:       0.0005   # 0.05% per side (Binance Futures taker)
  maker_fee_pct:       0.0002   # 0.02% per side (limit orders — not used by default)
  slippage_pct:        0.0002   # 0.02% per side (entry + exit market impact)
  funding_cost_per_8h: 0.0001   # 0.01% per 8h funding period (long-side bias)
